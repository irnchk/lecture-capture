name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r "Lecture Slide Capture.app/Contents/Resources/requirements.txt" pyinstaller

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm "packaging/windows/LectureSlideCapture.windows.spec"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: LectureSlideCapture-Windows
          path: dist/LectureSlideCapture.exe
